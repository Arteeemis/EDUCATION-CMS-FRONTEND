<a [routerLink]="['/news', post().id]" class="post-card">
  <div class="post-card__media">
    @if (post().image) {
      <img [src]="post().image" [alt]="post().title" class="post-card__image" loading="lazy" />
    } @else {
      <div class="post-card__image post-card__image--placeholder" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" width="48" height="48">
          <rect
            x="6"
            y="10"
            width="36"
            height="28"
            rx="2"
            stroke="currentColor"
            stroke-width="1.5"
          />
          <circle cx="16" cy="20" r="3" stroke="currentColor" stroke-width="1.5" />
          <path
            d="M6 32l10-10 10 10 6-6 10 10"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linejoin="round"
          />
        </svg>
      </div>
    }

    @if (post().is_urgent) {
      <div class="post-card__urgent">
        <app-badge variant="urgent">Важно</app-badge>
      </div>
    }
  </div>

  <div class="post-card__body">
    <time class="post-card__date">
      {{ post().published_at | date: 'd MMMM y' : '' : 'ru' }}
    </time>

    <h3 class="post-card__title">{{ post().title }}</h3>

    @if (tags().length > 0) {
      <ul class="post-card__tags">
        @for (tag of tags(); track tag) {
          <li>
            <app-badge variant="tag">{{ tag }}</app-badge>
          </li>
        }
      </ul>
    }

    <span class="post-card__cta" aria-hidden="true">
      Читать
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path
          d="M2 7h10M8 3l4 4-4 4"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </span>
  </div>
</a>
