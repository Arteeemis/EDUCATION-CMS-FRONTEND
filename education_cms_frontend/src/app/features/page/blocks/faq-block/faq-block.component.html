<section class="faq-block">
  @if (block().title) {
    <header class="faq-block__head">
      <p class="faq-block__eyebrow">Разбираемся</p>
      <h2 class="faq-block__title">{{ block().title }}</h2>
    </header>
  }

  @if (sortedQuestions().length === 0) {
    <p class="faq-block__empty">Пока нет вопросов.</p>
  } @else {
    <ul class="faq-block__list">
      @for (q of sortedQuestions(); track q.id; let i = $index) {
        <li class="faq-block__item" [class.is-open]="isOpen(q.id)">
          <button
            type="button"
            class="faq-block__question"
            [attr.aria-expanded]="isOpen(q.id)"
            [attr.aria-controls]="'faq-answer-' + q.id"
            (click)="toggle(q.id)"
          >
            <span class="faq-block__index">{{ (i + 1).toString().padStart(2, '0') }}</span>
            <span class="faq-block__question-text">{{ q.question }}</span>
            <span class="faq-block__icon" aria-hidden="true">
              <span class="faq-block__icon-line faq-block__icon-line--h"></span>
              <span class="faq-block__icon-line faq-block__icon-line--v"></span>
            </span>
          </button>
          <div
            class="faq-block__answer-wrap"
            [id]="'faq-answer-' + q.id"
            [attr.aria-hidden]="!isOpen(q.id)"
          >
            <div class="faq-block__answer">
              <div class="faq-block__answer-inner">{{ q.answer }}</div>
            </div>
          </div>
        </li>
      }
    </ul>
  }
</section>
